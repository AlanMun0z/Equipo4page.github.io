<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blog | No estás sola</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background:#ffe4ec;
    color:#222;
}

/* HEADER */

header{
    background: linear-gradient(135deg,#ff4d6d,#ff8fab);
    color:white;
    text-align:center;
    padding:60px 20px;
}

header h1{
    font-size:50px;
}

/* BOTON */

.btn{
    display:inline-block;
    margin-top:15px;
    padding:10px 18px;
    background:white;
    color:#ff4d6d;
    border-radius:30px;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

/* BLOG */

main{
    width:90%;
    max-width:1000px;
    margin:auto;
    padding:40px 0;
}

.blog-post{
    background:white;
    margin-bottom:30px;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

.blog-post img{
    width:100%;
    height:240px;
    object-fit:cover;
}

.blog-content{
    padding:20px;
}

.blog-content h2{
    color:#ff4d6d;
    margin-bottom:10px;
}

/* MODAL */

.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
    padding:20px;
}

.modal-content{
    background:white;
    max-width:750px;
    width:100%;
    padding:25px;
    border-radius:12px;
    max-height:85vh;
    overflow-y:auto;
}

.close{
    float:right;
    cursor:pointer;
    font-size:22px;
    font-weight:bold;
}

.modal-content h2{
    color:#ff4d6d;
    margin-bottom:15px;
}

.modal-content p{
    line-height:1.7;
    margin-bottom:12px;
}

</style>
</head>

<body>

<header>
    <h1>📰 Blog</h1>
    <p>Artículos completos sobre igualdad y conciencia social</p>
</header>

<main>

    <!-- POST 1 -->
    <div class="blog-post">
        <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1">

        <div class="blog-content">
            <h2>Derechos de las mujeres</h2>
            <p>Historia de la lucha por la igualdad y los avances sociales.</p>

            <button class="btn" onclick="openModal('m1')">Ver artículo completo</button>
        </div>
    </div>

    <!-- POST 2 -->
    <div class="blog-post">
        <img src="https://images.unsplash.com/photo-1529156069898-49953e39b3ac">

        <div class="blog-content">
            <h2>Micromachismos</h2>
            <p>Comportamientos invisibles que generan desigualdad.</p>

            <button class="btn" onclick="openModal('m2')">Ver artículo completo</button>
        </div>
    </div>

    <!-- POST 3 -->
    <div class="blog-post">
        <img src="https://images.unsplash.com/photo-1517048676732-d65bc937f952">

        <div class="blog-content">
            <h2>Igualdad en la escuela</h2>
            <p>Cómo crear espacios más justos desde la educación.</p>

            <button class="btn" onclick="openModal('m3')">Ver artículo completo</button>
        </div>
    </div>

</main>

<!-- MODAL -->
<div id="modal" class="modal" onclick="closeModal(event)">
    <div class="modal-content">
        <span class="close" onclick="closeModal(event)">✖</span>
        <div id="modalText"></div>
    </div>
</div>

<script>

function openModal(id){

    let content = {

        m1: `
            <h2>Derechos de las mujeres</h2>

            <p>La historia de los derechos de las mujeres es una de las luchas sociales más importantes de la humanidad. Durante siglos, las mujeres fueron excluidas de la educación, del voto y de la participación política.</p>

            <p>En muchas sociedades se esperaba que su único rol fuera el hogar, lo que limitaba completamente sus oportunidades de desarrollo personal y profesional.</p>

            <p>Con el surgimiento de los movimientos sufragistas en el siglo XIX y XX, las mujeres comenzaron a organizarse para exigir igualdad de derechos, especialmente el derecho al voto.</p>

            <p>Este proceso fue diferente en cada país, pero poco a poco se lograron avances importantes como el acceso a la educación superior y a trabajos profesionales.</p>

            <p>Aunque hoy existen leyes de igualdad, todavía persisten problemas como la brecha salarial, la violencia de género y la desigualdad en puestos de poder.</p>

            <p>La lucha continúa, buscando no solo igualdad legal, sino igualdad real en la vida diaria.</p>
        `,

        m2: `
            <h2>Micromachismos</h2>

            <p>Los micromachismos son pequeñas acciones, comentarios o actitudes cotidianas que refuerzan desigualdades de género de forma sutil.</p>

            <p>Aunque muchas veces no son intencionales, tienen un impacto acumulativo en la forma en que se percibe y trata a las mujeres.</p>

            <p>Ejemplos comunes incluyen interrumpir constantemente a una mujer, minimizar sus opiniones o asumir que ciertas tareas le corresponden por su género.</p>

            <p>También aparecen en la publicidad, donde se refuerzan estereotipos tradicionales como mujeres en roles domésticos y hombres en posiciones de autoridad.</p>

            <p>El problema es que estos comportamientos se normalizan y pasan desapercibidos, lo que dificulta su identificación y cambio.</p>

            <p>Reconocerlos es clave para construir relaciones más justas, basadas en el respeto y la igualdad.</p>
        `,

        m3: `
            <h2>Igualdad en la escuela</h2>

            <p>La escuela es un espacio clave para la formación de valores como el respeto, la igualdad y la convivencia.</p>

            <p>No solo se aprenden materias académicas, sino también formas de relacionarse con los demás y entender el mundo.</p>

            <p>Promover la igualdad en la escuela significa eliminar estereotipos, fomentar la participación equitativa y asegurar que todas las voces sean escuchadas.</p>

            <p>Los docentes tienen un papel importante al evitar sesgos inconscientes y promover un ambiente inclusivo para todos los estudiantes.</p>

            <p>Actividades colaborativas y espacios de diálogo ayudan a construir una comunidad más justa dentro del aula.</p>

            <p>La educación es una de las herramientas más poderosas para generar cambios sociales a largo plazo.</p>
        `
    };

    document.getElementById("modalText").innerHTML = content[id];
    document.getElementById("modal").style.display = "flex";
}

function closeModal(e){
    if(e.target.classList.contains("modal") || e.target.classList.contains("close")){
        document.getElementById("modal").style.display = "none";
    }
}

</script>

</body>
</html>
