<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blog | No estás sola</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background:#ffe4ec;
    color:#222;
}

/* HEADER */

header{
    background: linear-gradient(135deg,#ff4d6d,#ff8fab);
    color:white;
    text-align:center;
    padding:60px 20px;
}

header h1{
    font-size:50px;
}

/* BOTON */

.btn{
    display:inline-block;
    margin-top:15px;
    padding:10px 18px;
    background:white;
    color:#ff4d6d;
    border-radius:30px;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

/* BLOG */

main{
    width:90%;
    max-width:1000px;
    margin:auto;
    padding:40px 0;
}

.blog-post{
    background:white;
    margin-bottom:30px;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

.blog-post img{
    width:100%;
    height:240px;
    object-fit:cover;
}

.blog-content{
    padding:20px;
}

.blog-content h2{
    color:#ff4d6d;
    margin-bottom:10px;
}

/* MODAL */

.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
    padding:20px;
}

.modal-content{
    background:white;
    max-width:750px;
    width:100%;
    padding:25px;
    border-radius:12px;
    max-height:85vh;
    overflow-y:auto;
}

.modal-content img{
    width:100%;
    border-radius:10px;
    margin:10px 0;
}

.close{
    float:right;
    cursor:pointer;
    font-size:22px;
    font-weight:bold;
}

.modal-content h2{
    color:#ff4d6d;
    margin-bottom:15px;
}

.modal-content p{
    line-height:1.7;
    margin-bottom:12px;
}

</style>
</head>

<body>

<header>
    <h1>📰 Blog</h1>
    <p>Artículos completos sobre igualdad y conciencia social</p>
</header>

<main>

    <!-- POST 1 -->
    <div class="blog-post">
        <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1">

        <div class="blog-content">
            <h2>Derechos de las mujeres</h2>
            <p>Historia de la lucha por la igualdad y los avances sociales.</p>
            <button class="btn" onclick="openModal('m1')">Ver artículo completo</button>
        </div>
    </div>

    <!-- POST 2 -->
    <div class="blog-post">
        <img src="https://images.unsplash.com/photo-1529156069898-49953e39b3ac">

        <div class="blog-content">
            <h2>Micromachismos</h2>
            <p>Comportamientos invisibles que generan desigualdad.</p>
            <button class="btn" onclick="openModal('m2')">Ver artículo completo</button>
        </div>
    </div>

    <!-- POST 3 -->
    <div class="blog-post">
        <img src="https://images.unsplash.com/photo-1517048676732-d65bc937f952">

        <div class="blog-content">
            <h2>Igualdad en la escuela</h2>
            <p>Cómo crear espacios más justos desde la educación.</p>
            <button class="btn" onclick="openModal('m3')">Ver artículo completo</button>
        </div>
    </div>

</main>

<!-- MODAL -->
<div id="modal" class="modal" onclick="closeModal(event)">
    <div class="modal-content">
        <span class="close" onclick="closeModal(event)">✖</span>
        <div id="modalText"></div>
    </div>
</div>

<script>

function openModal(id){

let content = {

m1: `
<h2>Derechos de las mujeres</h2>

<p>Los derechos de las mujeres no siempre han sido reconocidos como hoy. A lo largo de la historia, las mujeres han tenido que luchar para obtener igualdad legal, social y política.</p>

<img src="img7.jpg">

<p>Durante siglos, en la mayoría de las sociedades, las mujeres no tenían derechos básicos como votar, estudiar libremente, trabajar sin permiso de un hombre o poseer bienes en igualdad de condiciones.</p>

<img src="img8.jpg">

<p>Uno de los avances más importantes fue el sufragio femenino. Nueva Zelanda fue el primer país en otorgarlo en 1893 y en México las mujeres votaron en 1955.</p>

<p>También hubo avances en educación, trabajo y derechos laborales como la igualdad salarial, aunque aún no se cumple completamente.</p>

<p>Hoy en día persisten retos como la brecha salarial, violencia de género y desigualdad en puestos de poder.</p>
`,

m2: `
<h2>Micromachismos</h2>

<p>Los micromachismos son comportamientos cotidianos, muchas veces sutiles, que refuerzan la desigualdad entre hombres y mujeres.</p>

<img src="img9.jpg">

<p>Ejemplos: “los hombres no lloran”, “ayuda a tu mamá en la cocina”, o asumir que ciertas tareas son “de mujeres”.</p>

<img src="img10.jpg">

<p>En la casa: mujeres con más carga doméstica, diferencias en educación de hijos e hijas.</p>

<p>En la escuela: estereotipos como “las niñas son más ordenadas” o interrupciones constantes.</p>

<p>Impacto: baja autoestima, desigualdad normalizada y limitación de oportunidades.</p>
`,

m3: `
<h2>Igualdad en la escuela</h2>

<p>La escuela es uno de los espacios más importantes para construir una sociedad más igualitaria.</p>

<img src="img11.jpg">

<p>Debe evitar estereotipos como “esto es de niños” o “esto es de niñas” y fomentar participación equitativa.</p>

<img src="img12.jpg">

<p>Se deben dar las mismas oportunidades de hablar, participar y aprender sin sesgos de género.</p>

<p>También es importante prevenir acoso, promover respeto y mostrar modelos positivos de hombres y mujeres en distintos roles.</p>

<p>La educación ayuda a formar generaciones más conscientes y justas.</p>
`

};

document.getElementById("modalText").innerHTML = content[id];
document.getElementById("modal").style.display = "flex";

}

function closeModal(e){
if(e.target.classList.contains("modal") || e.target.classList.contains("close")){
document.getElementById("modal").style.display = "none";
}
}

</script>

</body>
</html>
